<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Project micro-demo interaction storyboard</title>
<desc id="desc">Annotated visual markup for the Codex resume and portfolio handoff.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#050711"/>
    <stop offset="1" stop-color="#0b1230"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#8b5cf6"/>
    <stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
  </filter>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
  </marker>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:38px;font-weight:800;fill:#f5f7ff;letter-spacing:-1px}
    .subtitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:500;fill:#a8b3cf}
    .label{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:800;fill:#7dd3fc;letter-spacing:1.8px}
    .h2{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:800;fill:#f5f7ff}
    .h3{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:750;fill:#f5f7ff}
    .body{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:500;fill:#a8b3cf}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;font-weight:650;fill:#a8b3cf}
    .note-title{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#050711}
    .note-body{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:600;fill:#07111c}
    .panel{fill:#0d162d;stroke:#334155;stroke-width:1.2}
    .panel2{fill:#111a35;stroke:#475569;stroke-width:1}
    .wire{fill:#0a1022;stroke:#3b82f6;stroke-opacity:.55;stroke-width:1.2}
    .accent-line{stroke:#22d3ee;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .muted-line{stroke:#64748b;stroke-width:1.3;fill:none;stroke-dasharray:7 7}
  </style>
</defs>
<rect width="1600" height="1000" fill="url(#bg)"/>
<circle cx="1450" cy="80" r="220" fill="#8b5cf6" opacity=".10"/>
<circle cx="130" cy="900" r="280" fill="#22d3ee" opacity=".07"/>
<text x="70" y="72" class="label">PHASE 2 · HOVER / FOCUS / TAP MICRO-DEMO</text><text x="70" y="118" class="title">One project card, four accessible states</text><text x="70" y="151" class="subtitle">Truthful miniature workflows—not decorative autoplay screenshots.</text><g filter="url(#shadow)"><rect x="70" y="220" width="340" height="540" rx="24" fill="#0d162d" stroke="#334155" stroke-opacity=".75"/></g><text x="94" y="258" class="label">01 · REST</text><rect x="94" y="290" width="292" height="240" rx="18" fill="#111a35" stroke="#475569"/><rect x="114" y="310" width="78" height="10" rx="5" fill="#334155" opacity=".75"/><text x="114" y="348" class="h2">RBT-Pro Prep</text><rect x="114" y="368" width="232" height="7" rx="4" fill="#64748b"/><rect x="114" y="384" width="192" height="7" rx="4" fill="#475569"/><rect x="114" y="414" width="252" height="78" rx="12" fill="#091225" stroke="#334155"/><text x="130" y="444" class="tiny">STATIC POSTER</text><rect x="130" y="460" width="110" height="9" rx="5" fill="#334155"/><rect x="94" y="554" width="112" height="34" rx="10" fill="#334155" opacity=".86"/><text x="120" y="576" class="note-title">PLAY DEMO</text><rect x="216" y="554" width="170" height="34" rx="10" fill="#17233f" stroke="#475569"/><text x="251" y="576" class="tiny">OPEN PROJECT</text><text x="94" y="640" class="body">Project name, role, value, static</text><text x="94" y="659" class="body">poster, explicit actions.</text><g filter="url(#shadow)"><rect x="450" y="220" width="340" height="540" rx="24" fill="#0d162d" stroke="#8b5cf6" stroke-opacity=".75"/></g><text x="474" y="258" class="label">02 · HOVER / FOCUS</text><g transform="translate(620,410) rotate(-3) translate(-620,-410)"><rect x="474" y="280" width="292" height="250" rx="18" fill="#111a35" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/></g><rect x="494" y="310" width="78" height="10" rx="5" fill="#8b5cf6" opacity=".75"/><text x="494" y="348" class="h2">RBT-Pro Prep</text><rect x="494" y="368" width="232" height="7" rx="4" fill="#64748b"/><rect x="494" y="384" width="192" height="7" rx="4" fill="#475569"/><rect x="494" y="414" width="252" height="78" rx="12" fill="#091225" stroke="#8b5cf6"/><circle cx="620" cy="453" r="26" fill="#8b5cf6" opacity=".32"/><path d="M612 441 L634 453 L612 465 Z" fill="#f5f7ff"/><rect x="484" y="289" width="272" height="232" rx="20" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="7 5"/><rect x="474" y="554" width="112" height="34" rx="10" fill="#8b5cf6" opacity=".86"/><text x="500" y="576" class="note-title">PLAY DEMO</text><rect x="596" y="554" width="170" height="34" rx="10" fill="#17233f" stroke="#475569"/><text x="631" y="576" class="tiny">OPEN PROJECT</text><text x="474" y="640" class="body">Card lifts, bounded 3D tilt, visible</text><text x="474" y="659" class="body">focus, short delay before playback.</text><g filter="url(#shadow)"><rect x="830" y="220" width="340" height="540" rx="24" fill="#0d162d" stroke="#22d3ee" stroke-opacity=".75"/></g><text x="854" y="258" class="label">03 · WORKFLOW LOOP</text><rect x="854" y="290" width="292" height="240" rx="18" fill="#07101f" stroke="#22d3ee" stroke-width="2"/><rect x="874" y="310" width="78" height="10" rx="5" fill="#22d3ee" opacity=".75"/><text x="874" y="348" class="h2">RBT-Pro Prep</text><rect x="874" y="368" width="232" height="7" rx="4" fill="#64748b"/><rect x="874" y="384" width="192" height="7" rx="4" fill="#475569"/><circle cx="876" cy="443" r="16" fill="#22d3ee" opacity="0.95"/><line x1="893" y1="443" x2="919" y2="443" stroke="#64748b" stroke-width="3"/><circle cx="936" cy="443" r="16" fill="#22d3ee" opacity="0.95"/><line x1="953" y1="443" x2="979" y2="443" stroke="#64748b" stroke-width="3"/><circle cx="996" cy="443" r="16" fill="#22d3ee" opacity="0.95"/><line x1="1013" y1="443" x2="1039" y2="443" stroke="#64748b" stroke-width="3"/><circle cx="1056" cy="443" r="16" fill="#334155" opacity="0.5"/><text x="885" y="488" class="tiny">MAP → CARD → QUESTION → PROGRESS</text><rect x="854" y="554" width="112" height="34" rx="10" fill="#22d3ee" opacity=".86"/><text x="880" y="576" class="note-title">PLAY DEMO</text><rect x="976" y="554" width="170" height="34" rx="10" fill="#17233f" stroke="#475569"/><text x="1011" y="576" class="tiny">OPEN PROJECT</text><text x="854" y="640" class="body">A 4–8 second local demo shows an</text><text x="854" y="659" class="body">actual verified user flow.</text><g filter="url(#shadow)"><rect x="1210" y="220" width="340" height="540" rx="24" fill="#0d162d" stroke="#22c55e" stroke-opacity=".75"/></g><text x="1234" y="258" class="label">04 · TOUCH / REDUCED MOTION</text><rect x="1234" y="290" width="292" height="240" rx="18" fill="#111a35" stroke="#22c55e" stroke-width="1.5"/><rect x="1254" y="310" width="78" height="10" rx="5" fill="#22c55e" opacity=".75"/><text x="1254" y="348" class="h2">RBT-Pro Prep</text><rect x="1254" y="368" width="232" height="7" rx="4" fill="#64748b"/><rect x="1254" y="384" width="192" height="7" rx="4" fill="#475569"/><rect x="1254" y="414" width="252" height="78" rx="12" fill="#091225" stroke="#22c55e"/><text x="1270" y="443" class="tiny">STATIC FALLBACK</text><rect x="1270" y="460" width="84" height="24" rx="8" fill="#22c55e"/><text x="1288" y="477" class="note-title">PLAY</text><rect x="1234" y="554" width="112" height="34" rx="10" fill="#22c55e" opacity=".86"/><text x="1260" y="576" class="note-title">PLAY DEMO</text><rect x="1356" y="554" width="170" height="34" rx="10" fill="#17233f" stroke="#475569"/><text x="1391" y="576" class="tiny">OPEN PROJECT</text><text x="1234" y="640" class="body">Tap or Play control; static poster</text><text x="1234" y="659" class="body">and no automatic depth movement.</text><rect x="70" y="805" width="340" height="115" rx="18" fill="#111a35" stroke="#334155"/><text x="90" y="838" class="label">DESKTOP</text><text x="90" y="870" class="body">Hover and keyboard focus are equivalent.</text><rect x="450" y="805" width="340" height="115" rx="18" fill="#111a35" stroke="#334155"/><text x="470" y="838" class="label">TOUCH</text><text x="470" y="870" class="body">First tap activates; explicit action opens.</text><rect x="830" y="805" width="340" height="115" rx="18" fill="#111a35" stroke="#334155"/><text x="850" y="838" class="label">REDUCED MOTION</text><text x="850" y="870" class="body">No autoplay, tilt, parallax, or large transforms.</text><rect x="1210" y="805" width="340" height="115" rx="18" fill="#111a35" stroke="#334155"/><text x="1230" y="838" class="label">TRUTHFULNESS</text><text x="1230" y="870" class="body">Local sanitized data; no fake metrics or capabilities.</text></svg>