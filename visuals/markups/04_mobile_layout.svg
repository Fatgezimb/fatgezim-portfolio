<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Mobile layout and interaction markup</title>
<desc id="desc">Annotated visual markup for the Codex resume and portfolio handoff.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#050711"/>
    <stop offset="1" stop-color="#0b1230"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#8b5cf6"/>
    <stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
  </filter>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
  </marker>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:38px;font-weight:800;fill:#f5f7ff;letter-spacing:-1px}
    .subtitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:500;fill:#a8b3cf}
    .label{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:800;fill:#7dd3fc;letter-spacing:1.8px}
    .h2{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:800;fill:#f5f7ff}
    .h3{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:750;fill:#f5f7ff}
    .body{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:500;fill:#a8b3cf}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;font-weight:650;fill:#a8b3cf}
    .note-title{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#050711}
    .note-body{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:600;fill:#07111c}
    .panel{fill:#0d162d;stroke:#334155;stroke-width:1.2}
    .panel2{fill:#111a35;stroke:#475569;stroke-width:1}
    .wire{fill:#0a1022;stroke:#3b82f6;stroke-opacity:.55;stroke-width:1.2}
    .accent-line{stroke:#22d3ee;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .muted-line{stroke:#64748b;stroke-width:1.3;fill:none;stroke-dasharray:7 7}
  </style>
</defs>
<rect width="1600" height="1000" fill="url(#bg)"/>
<circle cx="1450" cy="80" r="220" fill="#8b5cf6" opacity=".10"/>
<circle cx="130" cy="900" r="280" fill="#22d3ee" opacity=".07"/>
<text x="70" y="72" class="label">MOBILE-FIRST · 390 PX REFERENCE</text><text x="70" y="118" class="title">Mobile flow and touch behavior</text><text x="70" y="151" class="subtitle">The same content hierarchy, with reduced spatial effects and explicit preview controls.</text><g filter="url(#shadow)"><rect x="80" y="210" width="300" height="650" rx="42" fill="#050711" stroke="#475569" stroke-width="2"/><rect x="178" y="223" width="104" height="22" rx="11" fill="#111827"/></g><text x="102" y="194" class="label">01 · HERO</text><rect x="98" y="258" width="264" height="48" rx="14" fill="#111a35" stroke="#334155"/><rect x="112" y="270" width="30" height="30" rx="9" fill="url(#accent)"/><rect x="156" y="277" width="92" height="9" rx="5" fill="#e2e8f0"/><rect x="308" y="272" width="34" height="20" rx="10" fill="#17233f"/><text x="104" y="346" class="label">SCIENCE → USEFUL SYSTEMS</text><rect x="104" y="372" width="245" height="28" rx="7" fill="#f5f7ff"/><rect x="104" y="410" width="210" height="28" rx="7" fill="#8b5cf6" opacity=".8"/><rect x="104" y="465" width="230" height="8" rx="4" fill="#475569"/><rect x="104" y="483" width="204" height="8" rx="4" fill="#475569"/><rect x="104" y="501" width="178" height="8" rx="4" fill="#475569"/><rect x="104" y="540" width="252" height="160" rx="22" fill="#0d162d" stroke="#22d3ee" stroke-opacity=".5"/><circle cx="230" cy="620" r="50" fill="#8b5cf6" opacity=".35"/><circle cx="230" cy="620" r="72" fill="none" stroke="#22d3ee" stroke-opacity=".45"/><rect x="104" y="730" width="158" height="44" rx="12" fill="url(#accent)"/><g filter="url(#shadow)"><rect x="430" y="210" width="300" height="650" rx="42" fill="#050711" stroke="#475569" stroke-width="2"/><rect x="528" y="223" width="104" height="22" rx="11" fill="#111827"/></g><text x="452" y="194" class="label">02 · PROJECT REST</text><rect x="448" y="258" width="264" height="48" rx="14" fill="#111a35" stroke="#334155"/><rect x="462" y="270" width="30" height="30" rx="9" fill="url(#accent)"/><rect x="506" y="277" width="92" height="9" rx="5" fill="#e2e8f0"/><rect x="658" y="272" width="34" height="20" rx="10" fill="#17233f"/><text x="454" y="346" class="label">RBT-PRO PREP</text><text x="454" y="382" class="h2">Competency learning</text><rect x="454" y="410" width="236" height="8" rx="4" fill="#475569"/><rect x="454" y="430" width="192" height="8" rx="4" fill="#334155"/><rect x="454" y="475" width="252" height="220" rx="18" fill="#091225" stroke="#334155"/><text x="476" y="520" class="tiny">STATIC POSTER</text><rect x="478" y="548" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="520" y="548" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="562" y="548" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="604" y="548" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="646" y="548" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="478" y="593" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="520" y="593" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="562" y="593" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="604" y="593" width="30" height="30" rx="8" fill="#17233f" stroke="#475569"/><rect x="454" y="720" width="116" height="40" rx="11" fill="#22d3ee"/><rect x="578" y="720" width="128" height="40" rx="11" fill="#17233f" stroke="#475569"/><g filter="url(#shadow)"><rect x="780" y="210" width="300" height="650" rx="42" fill="#050711" stroke="#475569" stroke-width="2"/><rect x="878" y="223" width="104" height="22" rx="11" fill="#111827"/></g><text x="802" y="194" class="label">03 · PROJECT ACTIVE</text><rect x="798" y="258" width="264" height="48" rx="14" fill="#111a35" stroke="#334155"/><rect x="812" y="270" width="30" height="30" rx="9" fill="url(#accent)"/><rect x="856" y="277" width="92" height="9" rx="5" fill="#e2e8f0"/><rect x="1008" y="272" width="34" height="20" rx="10" fill="#17233f"/><text x="804" y="346" class="label">TAP-ACTIVE PREVIEW</text><rect x="804" y="375" width="252" height="290" rx="20" fill="#091225" stroke="#8b5cf6" stroke-width="2"/><text x="826" y="420" class="tiny">PRACTICE QUESTION</text><rect x="826" y="444" width="204" height="12" rx="6" fill="#e2e8f0"/><rect x="826" y="485" width="204" height="34" rx="10" fill="#22c55e" stroke="#475569"/><rect x="826" y="533" width="204" height="34" rx="10" fill="#17233f" stroke="#475569"/><rect x="826" y="581" width="204" height="34" rx="10" fill="#17233f" stroke="#475569"/><rect x="804" y="690" width="116" height="40" rx="11" fill="#8b5cf6"/><rect x="928" y="690" width="128" height="40" rx="11" fill="#17233f" stroke="#475569"/><text x="828" y="715" class="note-title">PAUSE</text><g filter="url(#shadow)"><rect x="1130" y="210" width="300" height="650" rx="42" fill="#050711" stroke="#475569" stroke-width="2"/><rect x="1228" y="223" width="104" height="22" rx="11" fill="#111827"/></g><text x="1152" y="194" class="label">04 · REDUCED MOTION</text><rect x="1148" y="258" width="264" height="48" rx="14" fill="#111a35" stroke="#334155"/><rect x="1162" y="270" width="30" height="30" rx="9" fill="url(#accent)"/><rect x="1206" y="277" width="92" height="9" rx="5" fill="#e2e8f0"/><rect x="1358" y="272" width="34" height="20" rx="10" fill="#17233f"/><text x="1154" y="346" class="label">PREFERS-REDUCED-MOTION</text><rect x="1154" y="375" width="252" height="230" rx="20" fill="#091225" stroke="#22c55e"/><text x="1176" y="420" class="tiny">STATIC PROJECT POSTER</text><rect x="1176" y="450" width="204" height="12" rx="6" fill="#64748b"/><rect x="1176" y="474" width="170" height="10" rx="5" fill="#475569"/><rect x="1176" y="520" width="100" height="42" rx="12" fill="#22c55e"/><text x="1202" y="546" class="note-title">PLAY</text><rect x="1154" y="635" width="252" height="80" rx="16" fill="#111a35" stroke="#334155"/><text x="1172" y="670" class="h3">All content remains visible</text><text x="1172" y="695" class="tiny">No autoplay · no tilt · no scroll-linked depth</text><rect x="80" y="895" width="1350" height="65" rx="18" fill="#7dd3fc"/><text x="105" y="923" class="note-title">MOBILE RULE</text><text x="105" y="946" class="note-body">No hover-only information. Touch targets remain stable while visual layers move. 3D may be reduced or removed when it harms readability or responsiveness.</text></svg>