<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Desktop content and layout markup</title>
<desc id="desc">Annotated visual markup for the Codex resume and portfolio handoff.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#050711"/>
    <stop offset="1" stop-color="#0b1230"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#8b5cf6"/>
    <stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
  </filter>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
  </marker>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:38px;font-weight:800;fill:#f5f7ff;letter-spacing:-1px}
    .subtitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:500;fill:#a8b3cf}
    .label{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:800;fill:#7dd3fc;letter-spacing:1.8px}
    .h2{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:800;fill:#f5f7ff}
    .h3{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:750;fill:#f5f7ff}
    .body{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:500;fill:#a8b3cf}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;font-weight:650;fill:#a8b3cf}
    .note-title{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#050711}
    .note-body{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:600;fill:#07111c}
    .panel{fill:#0d162d;stroke:#334155;stroke-width:1.2}
    .panel2{fill:#111a35;stroke:#475569;stroke-width:1}
    .wire{fill:#0a1022;stroke:#3b82f6;stroke-opacity:.55;stroke-width:1.2}
    .accent-line{stroke:#22d3ee;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .muted-line{stroke:#64748b;stroke-width:1.3;fill:none;stroke-dasharray:7 7}
  </style>
</defs>
<rect width="1600" height="1000" fill="url(#bg)"/>
<circle cx="1450" cy="80" r="220" fill="#8b5cf6" opacity=".10"/>
<circle cx="130" cy="900" r="280" fill="#22d3ee" opacity=".07"/>
<text x="70" y="72" class="label">PHASE 1 · STATIC CONTENT + LAYOUT</text><text x="70" y="118" class="title">Desktop information architecture</text><text x="70" y="151" class="subtitle">Approve hierarchy, project selection, and copy before animation or 3D implementation.</text><g filter="url(#shadow)"><rect x="70" y="190" width="1080" height="720" rx="24" class="panel"/><rect x="70" y="190" width="1080" height="54" rx="24" fill="#111b34"/><circle cx="98" cy="217" r="6" fill="#fb7185"/><circle cx="119" cy="217" r="6" fill="#f59e0b"/><circle cx="140" cy="217" r="6" fill="#22c55e"/><rect x="185" y="206" width="400" height="23" rx="11" fill="#07101f" stroke="#334155"/><text x="205" y="222" class="tiny">portfolio.local / content-layout-review</text><rect x="94" y="263" width="1032" height="55" rx="14" class="panel2"/><rect x="112" y="275" width="34" height="34" rx="10" fill="url(#accent)"/><text x="160" y="293" class="h3">Zim Bela</text><text x="620" y="294" class="tiny">About</text><text x="713" y="294" class="tiny">Projects</text><text x="806" y="294" class="tiny">Experience</text><text x="899" y="294" class="tiny">Research</text><text x="992" y="294" class="tiny">Contact</text><rect x="94" y="334" width="640" height="252" rx="18" class="wire"/><text x="120" y="365" class="label">HERO COPY</text><rect x="120" y="390" width="480" height="28" rx="7" fill="#e2e8f0" opacity=".92"/><rect x="120" y="430" width="400" height="28" rx="7" fill="#c084fc" opacity=".75"/><rect x="120" y="474" width="520" height="10" rx="5" fill="#64748b"/><rect x="120" y="494" width="470" height="10" rx="5" fill="#475569"/><rect x="120" y="532" width="150" height="36" rx="11" fill="url(#accent)"/><rect x="282" y="532" width="150" height="36" rx="11" fill="#17233f" stroke="#475569"/><rect x="752" y="334" width="374" height="252" rx="18" class="wire"/><text x="778" y="365" class="label">FUTURE HERO VISUAL PLACEHOLDER</text><circle cx="940" cy="457" r="73" fill="none" stroke="#22d3ee" stroke-opacity=".45" stroke-width="2"/><circle cx="940" cy="457" r="45" fill="#8b5cf6" opacity=".35"/><path d="M850 500 C900 390,1000 390,1045 500" fill="none" stroke="#8b5cf6" stroke-width="2" opacity=".8"/><rect x="94" y="604" width="1032" height="170" rx="18" class="wire"/><text x="120" y="635" class="label">FEATURED PROJECT LAB · STATIC CARDS IN PHASE 1</text><rect x="120" y="656" width="220" height="95" rx="14" fill="#101a34" stroke="#8b5cf6" stroke-opacity=".55"/><rect x="134" y="670" width="70" height="10" rx="5" fill="#8b5cf6" opacity=".65"/><text x="134" y="704" class="h3">NeuroPath</text><rect x="134" y="720" width="162" height="7" rx="4" fill="#475569"/><rect x="134" y="735" width="130" height="7" rx="4" fill="#334155"/><rect x="364" y="656" width="220" height="95" rx="14" fill="#101a34" stroke="#22d3ee" stroke-opacity=".55"/><rect x="378" y="670" width="70" height="10" rx="5" fill="#22d3ee" opacity=".65"/><text x="378" y="704" class="h3">BelaData</text><rect x="378" y="720" width="162" height="7" rx="4" fill="#475569"/><rect x="378" y="735" width="130" height="7" rx="4" fill="#334155"/><rect x="608" y="656" width="220" height="95" rx="14" fill="#101a34" stroke="#f59e0b" stroke-opacity=".55"/><rect x="622" y="670" width="70" height="10" rx="5" fill="#f59e0b" opacity=".65"/><text x="622" y="704" class="h3">RBT-Pro</text><rect x="622" y="720" width="162" height="7" rx="4" fill="#475569"/><rect x="622" y="735" width="130" height="7" rx="4" fill="#334155"/><rect x="852" y="656" width="220" height="95" rx="14" fill="#101a34" stroke="#fb7185" stroke-opacity=".55"/><rect x="866" y="670" width="70" height="10" rx="5" fill="#fb7185" opacity=".65"/><text x="866" y="704" class="h3">Rethink</text><rect x="866" y="720" width="162" height="7" rx="4" fill="#475569"/><rect x="866" y="735" width="130" height="7" rx="4" fill="#334155"/><rect x="94" y="792" width="323" height="88" rx="16" class="panel2"/><text x="116" y="824" class="h3">Experience timeline</text><text x="116" y="850" class="body">Readable chronology first</text><rect x="432" y="792" width="323" height="88" rx="16" class="panel2"/><text x="454" y="824" class="h3">Skills + research</text><text x="454" y="850" class="body">Evidence-linked categories</text><rect x="770" y="792" width="356" height="88" rx="16" class="panel2"/><text x="792" y="824" class="h3">Founder + contact</text><text x="792" y="850" class="body">Clear identity and next action</text></g><rect x="1215" y="220" width="310" height="90" rx="16" fill="#7dd3fc" opacity=".95"/><text x="1233" y="248" class="note-title">1 · APPROVAL GATE</text><text x="1233" y="270" class="note-body">No motion libraries, generated production</text><text x="1233" y="286" class="note-body">art, or 3D before content approval.</text><path d="M 1215 265.0 C 1160 265.0, 1145 340, 1080 340" class="accent-line"/><rect x="1215" y="335" width="310" height="95" rx="16" fill="#7dd3fc" opacity=".95"/><text x="1233" y="363" class="note-title">2 · CONTENT FIRST</text><text x="1233" y="385" class="note-body">Headline, current roles, project facts,</text><text x="1233" y="401" class="note-body">dates, and calls to action must be</text><text x="1233" y="417" class="note-body">verified.</text><path d="M 1215 382.5 C 1160 382.5, 770 405, 705 405" class="accent-line"/><rect x="1215" y="458" width="310" height="95" rx="16" fill="#7dd3fc" opacity=".95"/><text x="1233" y="486" class="note-title">3 · PROJECT RANKING</text><text x="1233" y="508" class="note-body">Show four to six evidence-rich projects.</text><text x="1233" y="524" class="note-body">Named projects can be excluded if support</text><text x="1233" y="540" class="note-body">is weak.</text><path d="M 1215 505.5 C 1160 505.5, 1105 670, 1040 670" class="accent-line"/><rect x="1215" y="582" width="310" height="100" rx="16" fill="#7dd3fc" opacity=".95"/><text x="1233" y="610" class="note-title">4 · DEMO PLACEHOLDERS</text><text x="1233" y="632" class="note-body">Reserve dimensions for future</text><text x="1233" y="648" class="note-body">micro-demos, but keep Phase 1 posters</text><text x="1233" y="664" class="note-body">static.</text><path d="M 1215 632.0 C 1160 632.0, 995 740, 930 740" class="accent-line"/><rect x="1215" y="714" width="310" height="100" rx="16" fill="#7dd3fc" opacity=".95"/><text x="1233" y="742" class="note-title">5 · ACCESSIBLE FALLBACK</text><text x="1233" y="764" class="note-body">The entire résumé must remain</text><text x="1233" y="780" class="note-body">understandable without JavaScript,</text><text x="1233" y="796" class="note-body">animation, or WebGL.</text><path d="M 1215 764.0 C 1160 764.0, 735 840, 670 840" class="accent-line"/></svg>