<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Scroll and 3D motion map</title>
<desc id="desc">Annotated visual markup for the Codex resume and portfolio handoff.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#050711"/>
    <stop offset="1" stop-color="#0b1230"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#8b5cf6"/>
    <stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
  </filter>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
  </marker>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:38px;font-weight:800;fill:#f5f7ff;letter-spacing:-1px}
    .subtitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:500;fill:#a8b3cf}
    .label{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:800;fill:#7dd3fc;letter-spacing:1.8px}
    .h2{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:800;fill:#f5f7ff}
    .h3{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:750;fill:#f5f7ff}
    .body{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:500;fill:#a8b3cf}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;font-weight:650;fill:#a8b3cf}
    .note-title{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#050711}
    .note-body{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:600;fill:#07111c}
    .panel{fill:#0d162d;stroke:#334155;stroke-width:1.2}
    .panel2{fill:#111a35;stroke:#475569;stroke-width:1}
    .wire{fill:#0a1022;stroke:#3b82f6;stroke-opacity:.55;stroke-width:1.2}
    .accent-line{stroke:#22d3ee;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .muted-line{stroke:#64748b;stroke-width:1.3;fill:none;stroke-dasharray:7 7}
  </style>
</defs>
<rect width="1600" height="1000" fill="url(#bg)"/>
<circle cx="1450" cy="80" r="220" fill="#8b5cf6" opacity=".10"/>
<circle cx="130" cy="900" r="280" fill="#22d3ee" opacity=".07"/>
<text x="70" y="72" class="label">PHASE 2 · SCROLL IN / OUT + 3D DEPTH</text><text x="70" y="118" class="title">Motion hierarchy across the page</text><text x="70" y="151" class="subtitle">A few major spatial moments, many quiet utility transitions, and complete static fallbacks.</text><rect x="130" y="215" width="610" height="690" rx="30" class="panel" filter="url(#shadow)"/><line x1="170" y1="255" x2="170" y2="865" stroke="url(#accent)" stroke-width="5"/><circle cx="170" cy="275" r="13" fill="#8b5cf6" filter="url(#glow)"/><rect x="210" y="233" width="480" height="84" rx="16" fill="#111a35" stroke="#8b5cf6" stroke-opacity=".58"/><text x="232" y="263" class="label">HERO</text><text x="232" y="291" class="h3">Neural/data scene</text><text x="500" y="269" class="tiny">Enter: fade + depth</text><text x="500" y="289" class="tiny">Exit: gentle recede</text><circle cx="170" cy="400" r="13" fill="#22d3ee" filter="url(#glow)"/><rect x="210" y="358" width="480" height="84" rx="16" fill="#111a35" stroke="#22d3ee" stroke-opacity=".58"/><text x="232" y="388" class="label">PROJECT LAB</text><text x="232" y="416" class="h3">Cards pop into focus</text><text x="500" y="394" class="tiny">Hover/focus: 3D lift</text><text x="500" y="414" class="tiny">Loop: verified workflow</text><circle cx="170" cy="540" r="13" fill="#f59e0b" filter="url(#glow)"/><rect x="210" y="498" width="480" height="84" rx="16" fill="#111a35" stroke="#f59e0b" stroke-opacity=".58"/><text x="232" y="528" class="label">CAREER PATH</text><text x="232" y="556" class="h3">Connected milestones</text><text x="500" y="534" class="tiny">Scroll: draw path</text><text x="500" y="554" class="tiny">Keep chronology readable</text><circle cx="170" cy="675" r="13" fill="#22c55e" filter="url(#glow)"/><rect x="210" y="633" width="480" height="84" rx="16" fill="#111a35" stroke="#22c55e" stroke-opacity=".58"/><text x="232" y="663" class="label">RESEARCH</text><text x="232" y="691" class="h3">Artifacts in layers</text><text x="500" y="669" class="tiny">Selected item advances</text><text x="500" y="689" class="tiny">Others soften, not vanish</text><circle cx="170" cy="810" r="13" fill="#fb7185" filter="url(#glow)"/><rect x="210" y="768" width="480" height="84" rx="16" fill="#111a35" stroke="#fb7185" stroke-opacity=".58"/><text x="232" y="798" class="label">CONTACT</text><text x="232" y="826" class="h3">Stable final action</text><text x="500" y="804" class="tiny">Minimal motion</text><text x="500" y="824" class="tiny">No distraction</text><text x="820" y="235" class="label">MAJOR 3D SCENE · MAXIMUM TWO</text><g transform="translate(860 280)"><g transform="translate(0 0) skewX(-8)"><rect width="520" height="120" rx="18" fill="#0d162d" stroke="#334155" stroke-width="2" opacity="0.65" filter="url(#shadow)"/><text x="26" y="46" class="label">FOUNDATIONS</text><rect x="26" y="66" width="400" height="12" rx="6" fill="#334155" opacity=".45"/></g><g transform="translate(45 90) skewX(-8)"><rect width="480" height="130" rx="18" fill="#0d162d" stroke="#8b5cf6" stroke-width="2" opacity="0.78" filter="url(#shadow)"/><text x="26" y="46" class="label">SYSTEMS</text><rect x="26" y="66" width="360" height="12" rx="6" fill="#8b5cf6" opacity=".45"/></g><g transform="translate(95 190) skewX(-8)"><rect width="430" height="150" rx="18" fill="#0d162d" stroke="#22d3ee" stroke-width="2" opacity="0.98" filter="url(#shadow)"/><text x="26" y="46" class="label">APPLICATION</text><rect x="26" y="66" width="310" height="12" rx="6" fill="#22d3ee" opacity=".45"/></g></g><path d="M 980 665 C 1080 610, 1240 620, 1360 565" class="accent-line"/><text x="900" y="720" class="h2">Scroll progress controls depth—not navigation.</text><rect x="835" y="743" width="700" height="34" rx="10" fill="#111a35" stroke="#334155"/><text x="850" y="765" class="label">NO SCROLL HIJACKING</text><text x="1100" y="765" class="body">Native scrolling remains intact.</text><rect x="835" y="785" width="700" height="34" rx="10" fill="#111a35" stroke="#334155"/><text x="850" y="807" class="label">REVERSIBLE STATES</text><text x="1100" y="807" class="body">Entrance and exit states must tolerate back-scrolling.</text><rect x="835" y="827" width="700" height="34" rx="10" fill="#111a35" stroke="#334155"/><text x="850" y="849" class="label">OFF-SCREEN PAUSE</text><text x="1100" y="849" class="body">Animations and demos stop when out of view.</text><rect x="835" y="869" width="700" height="34" rx="10" fill="#111a35" stroke="#334155"/><text x="850" y="891" class="label">STATIC FALLBACK</text><text x="1100" y="891" class="body">No-JS and reduced-motion users receive complete content.</text><rect x="835" y="911" width="700" height="34" rx="10" fill="#111a35" stroke="#334155"/><text x="850" y="933" class="label">PERFORMANCE</text><text x="1100" y="933" class="body">Prefer transform/opacity; lazy-load optional WebGL.</text></svg>