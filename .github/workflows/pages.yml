name: Deploy Fatgezim Portfolio to GitHub Pages

on:
  push:
    branches: [codex/neural-command-center-redesign]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - run: npm run build
      - run: npm run start -- --port 4173 > /tmp/portfolio-server.log 2>&1 &
      - run: npx --yes wait-on http://127.0.0.1:4173
      - run: node scripts/export-pages.mjs
        env:
          PAGES_BASE_PATH: /fatgezim-portfolio
          PAGES_OUTPUT: pages-dist
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - id: deployment
        uses: actions/deploy-pages@v4
